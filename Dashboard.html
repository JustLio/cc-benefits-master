<!DOCTYPE html>
<html lang="en">
<head>
<base target="_top">
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: rgba(255,255,255,0.07);
    --blue: #4f8ef7;
    --blue-glow: rgba(79,142,247,0.15);
    --green: #3ecf8e;
    --green-glow: rgba(62,207,142,0.15);
    --amber: #f5a623;
    --red: #ff5c5c;
    --purple: #a78bfa;
    --text: #e8eaf0;
    --text-muted: #6b7280;
    --text-dim: #9ca3af;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    height: 100vh;
    overflow-y: auto;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .header p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
  .badge {
    background: var(--blue-glow);
    border: 1px solid rgba(79,142,247,0.3);
    color: var(--blue);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
  }
  .btn-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-close:hover { color: var(--text); }

  /* Main */
  .main { padding: 28px 40px; }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 400px;
    gap: 12px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--surface2);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }

  /* KPI Row */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 26px;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 26px;
    position: relative;
    overflow: hidden;
  }
  .kpi::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
  }
  .kpi.blue::before  { background: linear-gradient(90deg, var(--blue), var(--purple)); }
  .kpi.green::before { background: linear-gradient(90deg, var(--green), #06d6a0); }
  .kpi.amber::before { background: linear-gradient(90deg, var(--amber), #f97316); }
  .kpi.purple::before { background: linear-gradient(90deg, var(--purple), var(--blue)); }
  .kpi-icon { font-size: 22px; margin-bottom: 12px; display: block; }
  .kpi-value {
    font-size: 28px; font-weight: 600;
    letter-spacing: -0.5px; line-height: 1;
    margin-bottom: 4px;
    font-family: 'DM Mono', monospace;
  }
  .kpi.blue .kpi-value  { color: var(--blue); }
  .kpi.green .kpi-value { color: var(--green); }
  .kpi.amber .kpi-value { color: var(--amber); }
  .kpi.purple .kpi-value { color: var(--purple); }
  .kpi-label { font-size: 13px; color: var(--text-muted); }
  .kpi-sub { font-size: 12px; color: var(--text-muted); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  .kpi-sub span { color: var(--green); }

  /* Section title */
  .section-title {
    font-size: 12px; font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Two col */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 26px; }

  /* Renewal panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 28px;
  }
  .renewal-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .renewal-item:last-child { border-bottom: none; padding-bottom: 0; }
  .renewal-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .renewal-dot.urgent { background: var(--red);        box-shadow: 0 0 6px var(--red); }
  .renewal-dot.soon   { background: var(--amber);      box-shadow: 0 0 6px var(--amber); }
  .renewal-dot.ok     { background: var(--green);      box-shadow: 0 0 6px var(--green); }
  .renewal-dot.none   { background: var(--text-muted); }
  .renewal-info { flex: 1; }
  .renewal-name  { font-size: 14px; font-weight: 500; }
  .renewal-bank  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .renewal-right { text-align: right; }
  .renewal-days  { font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .renewal-days.urgent { color: var(--red); }
  .renewal-days.soon   { color: var(--amber); }
  .renewal-days.ok     { color: var(--green); }
  .renewal-date  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* Bar chart */
  .bar-row { margin-bottom: 15px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-meta { display: flex; justify-content: space-between; margin-bottom: 7px; }
  .bar-name { font-size: 13px; color: var(--text-dim); font-weight: 500; }
  .bar-val  { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--text); }
  .bar-track { height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill  { height: 100%; border-radius: 4px; }

  /* Card tiles */
  .cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 26px; }
  .card-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    transition: transform 0.2s, border-color 0.2s;
  }
  .card-tile:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.14); }
  .card-tile-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .card-bank { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
  .card-name { font-size: 16px; font-weight: 600; margin-top: 3px; letter-spacing: -0.2px; }
  .card-network { font-size: 10px; padding: 3px 9px; border-radius: 6px; font-weight: 700; border: 1px solid; }
  .net-visa { color: #1a1f71; background: #e8e9f5; border-color: #c5c8e8; }
  .net-amex { color: #006fcf; background: #e0eefa; border-color: #b0d0f0; }
  .net-mc   { color: #eb001b; background: #fde8ea; border-color: #f5b8bc; }
  .net-other { color: var(--text-muted); background: var(--surface2); border-color: var(--border); }
  .card-stat { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .card-stat:last-of-type { margin-bottom: 0; }
  .stat-label { font-size: 12px; color: var(--text-muted); }
  .stat-val { font-size: 13px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .stat-val.green  { color: var(--green); }
  .stat-val.amber  { color: var(--amber); }
  .stat-val.blue   { color: var(--blue); }
  .stat-val.red    { color: var(--red); }
  .card-tile-footer { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .reminder-pill { font-size: 11px; padding: 3px 9px; border-radius: 8px; font-weight: 600; }
  .reminder-pill.on  { background: var(--green-glow); color: var(--green); border: 1px solid rgba(62,207,142,0.3); }
  .reminder-pill.off { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .cpp-badge { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--blue); background: var(--blue-glow); border: 1px solid rgba(79,142,247,0.3); padding: 3px 9px; border-radius: 8px; }

  /* Pinned benefits */
  .pinned-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 26px; }
  .pinned-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--purple);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .pinned-name  { font-size: 14px; font-weight: 500; color: var(--text); }
  .pinned-sub   { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .pinned-right { text-align: right; flex-shrink: 0; }
  .pinned-value { font-size: 15px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--amber); }
  .pinned-freq  { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .pinned-empty { color: var(--text-muted); font-size: 14px; padding: 20px 0; text-align: center; }

  /* Recurring Credits */
  .credits-wrap { margin-bottom: 26px; }
  .credits-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .credits-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 22px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .credits-card-title { font-size: 14px; font-weight: 600; }
  .credits-card-bank  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .credits-prog { display: flex; align-items: center; gap: 10px; }
  .credits-prog-track { width: 80px; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .credits-prog-fill  { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .credits-prog-label { font-size: 12px; color: var(--text-muted); font-family: 'DM Mono', monospace; white-space: nowrap; }
  .credit-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 22px;
    border-bottom: 1px solid var(--border);
  }
  .credit-row:last-child { border-bottom: none; }
  .credit-row.used-row { opacity: 0.45; }
  .credit-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }
  .credit-check.done { background: var(--green-glow); color: var(--green); border: 1.5px solid rgba(62,207,142,0.4); }
  .credit-check.todo { background: var(--surface2); color: var(--text-muted); border: 1.5px solid var(--border); }
  .credit-name { flex: 1; font-size: 13px; }
  .credit-name.struck { text-decoration: line-through; color: var(--text-muted); }
  .credit-val { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--amber); min-width: 54px; text-align: right; font-weight: 600; }
  .credit-val.no-val { color: var(--text-muted); font-weight: normal; }
  .credit-freq-pill { font-size: 11px; color: var(--text-muted); padding: 2px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; white-space: nowrap; }
  .credit-status-pill { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 6px; white-space: nowrap; min-width: 64px; text-align: center; }
  .credit-status-pill.done { background: var(--green-glow); color: var(--green); border: 1px solid rgba(62,207,142,0.3); }
  .credit-status-pill.todo { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .credits-remaining { font-size: 13px; font-family: 'DM Mono', monospace; font-weight: 600; color: var(--amber); }
  .credits-remaining.all-used { color: var(--green); }
  .reset-pill { font-size: 11px; padding: 2px 9px; border-radius: 6px; white-space: nowrap; border: 1px solid; }
  .reset-pill.urgent { color: var(--red);        background: rgba(255,92,92,0.1);   border-color: rgba(255,92,92,0.35); }
  .reset-pill.soon   { color: var(--amber);      background: rgba(245,166,35,0.1);  border-color: rgba(245,166,35,0.35); }
  .reset-pill.ok     { color: var(--text-muted); background: var(--surface2);       border-color: var(--border); }

  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .animate { animation: fadeUp 0.35s ease both; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">💳</div>
    <div>
      <h1>Card Dashboard</h1>
      <p id="lastUpdated">Loading...</p>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="badge" id="cardCount">— Cards</span>
    <button class="btn-close" onclick="google.script.host.close()">✕ Close</button>
  </div>
</div>

<div class="main" id="main">
  <div class="loading">
    <div class="spinner"></div>
    <span>Loading your cards...</span>
  </div>
</div>

<script>
  function buildDonut(remaining, total) {
    if (total == null || total === 0) return '<span style="min-width:40px;text-align:center;font-size:13px;font-family:monospace;color:var(--text-muted)">—</span>';
    const r = 13, circ = 2 * Math.PI * r;
    const rem = remaining != null ? remaining : total;
    const remFrac = Math.min(1, Math.max(0, rem / total));
    const done = rem <= 0;
    const color = done ? '#3ecf8e' : '#f5a623';
    const label = done ? '✓' : (rem % 1 === 0 ? '$' + rem : '$' + rem.toFixed(2));
    return `<svg width="40" height="40" viewBox="0 0 40 40" style="flex-shrink:0">
      <circle cx="20" cy="20" r="${r}" fill="none" stroke="#22263a" stroke-width="5"/>
      <circle cx="20" cy="20" r="${r}" fill="none" stroke="${color}" stroke-width="5"
        stroke-dasharray="${(remFrac * circ).toFixed(2)} ${circ.toFixed(2)}"
        transform="rotate(-90 20 20)"/>
      <text x="20" y="${done ? '25' : '24'}" text-anchor="middle"
        font-size="${done ? '13' : '8.5'}" fill="${color}"
        font-family="monospace" font-weight="bold">${label}</text>
    </svg>`;
  }

  // Fetch data from the sheet on load
  google.script.run
    .withSuccessHandler(init)
    .withFailureHandler(err => {
      document.getElementById('main').innerHTML =
        `<div class="empty"><div class="empty-icon">⚠️</div><h3>Could not load data</h3><p>${err.message}</p></div>`;
    })
    .getDashboardData();

  function init(dataString) {
    const payload        = JSON.parse(dataString);
    const cards          = payload.cards          || [];
    const pinnedBenefits = payload.pinnedBenefits || [];
    if (!cards.length) {
      document.getElementById('main').innerHTML =
        `<div class="empty"><div class="empty-icon">💳</div><h3>No cards yet</h3><p>Use "Add New Card" to get started.</p></div>`;
      return;
    }

    const today = new Date();
    today.setHours(0,0,0,0);

    // ── Calculations ──
    const totalFees    = cards.reduce((s, c) => s + c.annualFee, 0);
    const totalPoints  = cards.reduce((s, c) => s + c.points, 0);
    const totalValue   = cards.reduce((s, c) => s + (c.points * (c.cpp / 100)), 0);
    const avgCpp       = cards.filter(c => c.cpp > 0).reduce((s,c,_,a) => s + c.cpp/a.length, 0);

    // Days until renewal
    function daysUntil(dateStr) {
      if (!dateStr) return null;
      const d = new Date(dateStr + 'T00:00:00');
      return Math.round((d - today) / 86400000);
    }

    function urgency(days) {
      if (days === null) return 'none';
      if (days <= 30)   return 'urgent';
      if (days <= 90)   return 'soon';
      return 'ok';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
    }

    function fmtPts(n) {
      return n >= 1000 ? (n/1000).toFixed(1).replace(/\.0$/,'') + 'K' : n.toString();
    }

    function networkBadge(network) {
      const n = (network || '').toLowerCase();
      if (n === 'amex')                       return '<span class="card-network net-amex">AMEX</span>';
      if (n === 'visa')                       return '<span class="card-network net-visa">VISA</span>';
      if (n === 'mastercard' || n === 'mc')   return '<span class="card-network net-mc">MC</span>';
      return '<span class="card-network net-other">CARD</span>';
    }

    const renewalUrgentCount = cards.filter(c => {
      const d = daysUntil(c.renewalDate);
      return d !== null && d <= 90;
    }).length;

    // Update header
    document.getElementById('cardCount').textContent = cards.length + ' Card' + (cards.length !== 1 ? 's' : '');
    document.getElementById('lastUpdated').textContent = 'As of ' + today.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'});

    // ── Sorted for renewal panel ──
    const sortedByRenewal = [...cards].sort((a, b) => {
      const da = daysUntil(a.renewalDate) ?? 9999;
      const db = daysUntil(b.renewalDate) ?? 9999;
      return da - db;
    });

    // ── Sorted for bar chart ──
    const sortedByPoints = [...cards].sort((a, b) => b.points - a.points);
    const maxPoints = sortedByPoints[0]?.points || 1;

    const barColors = [
      'linear-gradient(90deg,#a78bfa,#4f8ef7)',
      'linear-gradient(90deg,#4f8ef7,#06b6d4)',
      'linear-gradient(90deg,#3ecf8e,#06b6d4)',
      'linear-gradient(90deg,#f5a623,#f97316)',
      'linear-gradient(90deg,#ff5c5c,#f5a623)',
      'linear-gradient(90deg,#a78bfa,#3ecf8e)',
    ];

    // ── Build HTML ──
    let html = '';

    // KPI row
    html += `<div class="kpi-row animate">
      <div class="kpi blue">
        <span class="kpi-icon">💳</span>
        <div class="kpi-value">$${totalFees.toLocaleString()}</div>
        <div class="kpi-label">Total Annual Fees</div>
        <div class="kpi-sub">Across <span>${cards.length} cards</span></div>
      </div>
      <div class="kpi green">
        <span class="kpi-icon">⭐</span>
        <div class="kpi-value">${fmtPts(totalPoints)}</div>
        <div class="kpi-label">Total Points Balance</div>
        <div class="kpi-sub">Avg <span>${fmtPts(Math.round(totalPoints/cards.length))}</span> per card</div>
      </div>
      <div class="kpi amber">
        <span class="kpi-icon">💰</span>
        <div class="kpi-value">$${Math.round(totalValue).toLocaleString()}</div>
        <div class="kpi-label">Estimated Value</div>
        <div class="kpi-sub">Avg CPP <span>${avgCpp.toFixed(2)}¢</span></div>
      </div>
      <div class="kpi purple">
        <span class="kpi-icon">🔔</span>
        <div class="kpi-value">${renewalUrgentCount}</div>
        <div class="kpi-label">Renewals Within 90 Days</div>
        <div class="kpi-sub">${renewalUrgentCount > 0 ? '<span>Action needed</span>' : 'All clear'}</div>
      </div>
    </div>`;

    // Two-col: Points chart (left) + Renewals (right)
    html += `<div class="two-col">`;

    // Points bar chart
    html += `<div><div class="section-title">📊 Points by Card</div><div class="panel">`;
    sortedByPoints.forEach((c, i) => {
      const pct = (c.points / maxPoints * 100).toFixed(1);
      html += `<div class="bar-row">
        <div class="bar-meta">
          <div>
            <div style="font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:2px">${c.bank}</div>
            <span class="bar-name">${c.cardName}</span>
          </div>
          <span class="bar-val">${c.points.toLocaleString()}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${barColors[i % barColors.length]}"></div>
        </div>
      </div>`;
    });
    html += `</div></div>`;

    // Renewal panel
    html += `<div><div class="section-title">🗓 Renewing Soon</div><div class="panel">`;
    sortedByRenewal.forEach(c => {
      const days = daysUntil(c.renewalDate);
      const urg  = urgency(days);
      const daysLabel = days === null ? '—' : days < 0 ? 'Overdue' : days + ' days';
      html += `<div class="renewal-item">
        <div class="renewal-dot ${urg}"></div>
        <div class="renewal-info">
          <div class="renewal-bank">${c.bank}</div>
          <div class="renewal-name">${c.cardName}</div>
          <div class="renewal-bank">$${c.annualFee.toLocaleString()}/yr</div>
        </div>
        <div class="renewal-right">
          <div class="renewal-days ${urg}">${daysLabel}</div>
          <div class="renewal-date">${formatDate(c.renewalDate)}</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;

    html += `</div>`; // end two-col

    // Card tiles
    html += `<div class="section-title">💳 At a Glance</div><div class="cards-grid">`;
    cards.forEach(c => {
      const days    = daysUntil(c.renewalDate);
      const urg     = urgency(days);
      const daysLabel = days === null ? '—' : days < 0 ? 'Overdue' : days + ' days';
      const renewColor = urg === 'urgent' ? 'red' : urg === 'soon' ? 'amber' : urg === 'ok' ? 'green' : '';
      const dot = urg === 'urgent' ? '🔴' : urg === 'soon' ? '🟡' : urg === 'ok' ? '🟢' : '';
      const estVal = c.cpp > 0 ? '$' + Math.round(c.points * c.cpp / 100).toLocaleString() : '—';
      const feeColor = c.annualFee === 0 ? 'green' : 'amber';

      html += `<div class="card-tile">
        <div class="card-tile-top">
          <div>
            <div class="card-bank">${c.bank}</div>
            <div class="card-name">${c.cardName}</div>
          </div>
          ${networkBadge(c.network)}
        </div>
        <div class="card-stat">
          <span class="stat-label">Points</span>
          <span class="stat-val blue">${c.points.toLocaleString()}</span>
        </div>
        <div class="card-stat">
          <span class="stat-label">Est. Value</span>
          <span class="stat-val green">${estVal}</span>
        </div>
        <div class="card-stat">
          <span class="stat-label">Annual Fee</span>
          <span class="stat-val ${feeColor}">$${c.annualFee.toLocaleString()}</span>
        </div>
        <div class="card-stat">
          <span class="stat-label">Renews</span>
          <span class="stat-val ${renewColor}">${formatDate(c.renewalDate)} · ${dot} ${daysLabel}</span>
        </div>
        <div class="card-tile-footer">
          <span class="cpp-badge">${c.cpp > 0 ? c.cpp + '¢ CPP' : 'No CPP'}</span>
          <span class="reminder-pill ${c.renewalReminder ? 'on' : 'off'}">${c.renewalReminder ? '🔔 Reminder On' : 'Reminder Off'}</span>
        </div>
      </div>`;
    });
    html += `</div>`;

    // Recurring credits section — shows only pinned recurring benefits
    const recurringCredits = payload.recurringCredits || [];
    if (recurringCredits.length) {
      // Group by card, preserving BT row order
      const cardOrder = [];
      const byCard = {};
      recurringCredits.forEach(c => {
        const k = c.bank + '|' + c.cardName;
        if (!byCard[k]) { cardOrder.push(k); byCard[k] = { bank: c.bank, cardName: c.cardName, credits: [] }; }
        byCard[k].credits.push(c);
      });
      // Sort by value desc
      cardOrder.forEach(k => {
        byCard[k].credits.sort((a, b) => {
          const va = parseFloat(String(a.value).replace('$','')) || 0;
          const vb = parseFloat(String(b.value).replace('$','')) || 0;
          return vb - va;
        });
      });

      html += `<div class="section-title">🔁 Recurring Credits to Use</div><div class="credits-wrap">`;
      cardOrder.forEach(k => {
        const card   = byCard[k];
        const toUse  = card.credits.filter(c => c.remaining != null).reduce((s, c) => s + c.remaining, 0);
        const toUseStr = toUse > 0 ? `$${toUse.toLocaleString()} remaining` : '';

        html += `<div class="credits-card">
          <div class="credits-card-header">
            <div>
              <div class="credits-card-title">${card.cardName}</div>
              <div class="credits-card-bank">${card.bank}</div>
            </div>
            ${toUseStr ? `<span class="credits-remaining">${toUseStr}</span>` : ''}
          </div>`;

        card.credits.forEach(c => {
          const rstCls   = c.daysLeft == null ? 'ok' : c.daysLeft <= 5 ? 'urgent' : c.daysLeft <= 14 ? 'soon' : 'ok';
          const daysLabel = c.daysLeft != null ? c.daysLeft + 'd' : '—';
          html += `<div class="credit-row">
            <span class="credit-name">${c.name}</span>
            ${buildDonut(c.remaining, c.valueNum)}
            <span class="reset-pill ${rstCls}">${daysLabel}</span>
          </div>`;
        });
        html += `</div>`; // end credits-card
      });
      html += `</div>`; // end credits-wrap
    }

    // Pinned benefits section
    html += `<div class="section-title">📌 Pinned Benefits</div>`;
    if (pinnedBenefits.length) {
      html += `<div class="pinned-grid">`;
      pinnedBenefits.forEach(b => {
        const valHtml = (b.value && b.value !== '—') ? `<div class="pinned-value">${b.value}</div>` : '';
        html += `<div class="pinned-item">
          <div>
            <div class="pinned-name">${b.name}</div>
            <div class="pinned-sub">${b.bank} ${b.cardName} · ${b.category}</div>
          </div>
          <div class="pinned-right">
            ${valHtml}
            <div class="pinned-freq">${b.frequency}</div>
          </div>
        </div>`;
      });
      html += `</div>`;
    } else {
      html += `<div class="panel"><div class="pinned-empty">No benefits pinned yet — check 📌 PIN in the Benefits Tracker to show them here.</div></div>`;
    }

    document.getElementById('main').innerHTML = html;
  }
</script>
</body>
</html>
