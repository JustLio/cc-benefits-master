<!DOCTYPE html>
<html>
<head>
<base target="_top">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
  body { background: #fff; }

  .header {
    background: #1a73e8;
    color: white;
    padding: 18px 22px 14px;
  }
  .header h2 { font-size: 17px; font-weight: 600; }
  .header p { font-size: 12px; opacity: 0.85; margin-top: 3px; }
  .progress-bar { height: 4px; background: rgba(255,255,255,0.3); margin-top: 12px; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: white; border-radius: 2px; transition: width 0.3s ease; }

  .body { padding: 24px 22px 8px; }
  .step-label { font-size: 11px; font-weight: 600; color: #1a73e8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .question { font-size: 17px; font-weight: 500; color: #222; margin-bottom: 18px; }

  input[type=text], input[type=number], input[type=date], select {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 14px;
    color: #333;
    outline: none;
    background: #fafafa;
  }
  input:focus, select:focus { border-color: #1a73e8; background: #fff; }

  .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 9px 16px;
    border-radius: 20px;
    border: 2px solid #e0e0e0;
    font-size: 13px;
    cursor: pointer;
    color: #444;
    background: #fff;
    transition: all 0.15s;
  }
  .chip:hover { border-color: #1a73e8; color: #1a73e8; }
  .chip.selected { background: #1a73e8; color: white; border-color: #1a73e8; }

  .field-group { display: flex; flex-direction: column; gap: 14px; }
  .field-label { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    cursor: pointer;
    background: #fafafa;
    transition: border-color 0.15s;
  }
  .checkbox-row:hover { border-color: #1a73e8; }
  .checkbox-row.checked { border-color: #1a73e8; background: #e8f0fe; }
  .checkbox-row input { width: 17px; height: 17px; accent-color: #1a73e8; cursor: pointer; }
  .checkbox-row span { font-size: 14px; color: #333; }

  .footer {
    padding: 16px 22px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #f0f0f0;
    margin-top: 14px;
  }
  .btn-back { background: none; border: 1px solid #ddd; padding: 9px 18px; border-radius: 6px; font-size: 13px; color: #666; cursor: pointer; }
  .btn-back:hover { background: #f5f5f5; }
  .btn-next { background: #1a73e8; color: white; border: none; padding: 9px 22px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-next:hover { background: #1558b0; }
  .btn-submit { background: #34a853; color: white; border: none; padding: 9px 22px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-submit:hover { background: #2d8f47; }
  .step-counter { font-size: 12px; color: #999; }

  /* ── Step 5: Review (read-only) ── */
  .preview-body { padding: 16px 22px 6px; }
  .preview-card-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 10px; padding-bottom: 10px; border-bottom: 2px solid #f0f0f0;
  }
  .preview-card-name { font-size: 15px; font-weight: 600; color: #222; }
  .preview-bank-name { font-size: 11px; color: #999; margin-top: 2px; }
  .preview-fee-badge {
    background: #fff3e0; border: 1px solid #ffe0b2; color: #e65100;
    border-radius: 6px; padding: 3px 9px; font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .preview-section-label {
    font-size: 10px; font-weight: 700; color: #1a73e8;
    text-transform: uppercase; letter-spacing: 0.5px; margin: 8px 0 4px;
  }
  .preview-scroll { max-height: 260px; overflow-y: auto; padding-right: 2px; }
  .earn-rate-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; border-bottom: 1px solid #f5f5f5; }
  .earn-rate-row:last-child { border-bottom: none; }
  .earn-mult-badge {
    background: #ede7f6; color: #5e35b1; font-size: 12px; font-weight: 700;
    padding: 2px 8px; border-radius: 10px; min-width: 32px; text-align: center;
  }
  .earn-cat-text { font-size: 12px; color: #444; }
  .benefit-item { padding: 5px 0; border-bottom: 1px solid #f5f5f5; }
  .benefit-item:last-child { border-bottom: none; }
  .benefit-item-name { font-size: 12px; color: #333; }
  .benefit-meta { display: flex; gap: 8px; align-items: center; margin-top: 2px; }
  .benefit-val  { font-size: 12px; font-weight: 600; color: #e65100; }
  .benefit-freq { font-size: 11px; color: #999; }
  .no-data-note { color: #999; font-size: 12px; padding: 10px 0; text-align: center; }
  .preview-loading { padding: 36px 22px; text-align: center; color: #999; font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <h2>Add Credit Card</h2>
  <p>Enter your card details step by step</p>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div id="formContent"></div>

<script>

  let cardDatabase = {};
  const TOTAL_STEPS = 5;
  let step = 1;
  let data = {};
  let previewData = null;

  // Escape strings before injecting into innerHTML. Card / bank / benefit names
  // come from the GitHub JSON, so a name with & < > " ' shouldn't break markup.
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(m) {
      return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[m];
    });
  }

  function render() {
    document.getElementById('progressFill').style.width = (step === TOTAL_STEPS ? 100 : Math.round((step - 1) / TOTAL_STEPS * 100)) + '%';

    let content = '';

    // ── Step 1: Bank selection ──
    if (step === 1) {
      const banks = Object.keys(cardDatabase);
      const chips = banks.map(b =>
        `<div class="chip ${data.bank === b ? 'selected' : ''}" data-bank="${esc(b)}" onclick="selectBank(this)">${esc(b)}</div>`
      ).join('');
      content = `
        <div class="body">
          <div class="step-label">Step 1 of ${TOTAL_STEPS}</div>
          <div class="question">Who is the issuing bank?</div>
          <div class="chip-group">${chips}</div>
        </div>
        <div class="footer">
          <span></span>
          <div style="display:flex;align-items:center;gap:12px">
            <span class="step-counter">1 / ${TOTAL_STEPS}</span>
            <button class="btn-next" onclick="next()">Next →</button>
          </div>
        </div>`;

    // ── Step 2: Card name dropdown ──
    } else if (step === 2) {
      const cards = cardDatabase[data.bank] || [];
      const options = cards.map(c =>
        `<option value="${esc(c)}" ${data.cardName === c ? 'selected' : ''}>${esc(c)}</option>`
      ).join('');
      content = `
        <div class="body">
          <div class="step-label">Step 2 of ${TOTAL_STEPS}</div>
          <div class="question">Which ${esc(data.bank)} card?</div>
          <select id="cardSelect" onchange="data.cardName = this.value">
            <option value="">— Select a card —</option>
            ${options}
          </select>
        </div>
        <div class="footer">
          <button class="btn-back" onclick="back()">← Back</button>
          <div style="display:flex;align-items:center;gap:12px">
            <span class="step-counter">2 / ${TOTAL_STEPS}</span>
            <button class="btn-next" onclick="next()">Next →</button>
          </div>
        </div>`;

    // ── Step 3: Points balance ──
    } else if (step === 3) {
      content = `
        <div class="body">
          <div class="step-label">Step 3 of ${TOTAL_STEPS}</div>
          <div class="question">How many points do you currently have?</div>
          <input type="number" id="pointsInput" placeholder="e.g. 75000"
            value="${data.points || ''}"
            oninput="data.points = this.value"
            onkeydown="if(event.key==='Enter') next()">
        </div>
        <div class="footer">
          <button class="btn-back" onclick="back()">← Back</button>
          <div style="display:flex;align-items:center;gap:12px">
            <span class="step-counter">3 / ${TOTAL_STEPS}</span>
            <button class="btn-next" onclick="next()">Next →</button>
          </div>
        </div>`;

    // ── Step 4: Renewal date + reminder ──
    } else if (step === 4) {
      const isChecked = data.renewalReminder === true;
      content = `
        <div class="body">
          <div class="step-label">Step 4 of ${TOTAL_STEPS}</div>
          <div class="question">Renewal details</div>
          <div class="field-group">

            <div>
              <div class="field-label">Renewal Date</div>
              <input type="date"
                value="${data.renewalDate || ''}"
                oninput="data.renewalDate = this.value">
            </div>

            <div>
              <div class="field-label">Renewal Reminder</div>
              <label class="checkbox-row ${isChecked ? 'checked' : ''}" id="reminderRow">
                <input type="checkbox" id="reminderBox" ${isChecked ? 'checked' : ''}
                  onchange="toggleReminder(this)">
                <span>Send me a reminder before renewal</span>
              </label>
            </div>

          </div>
        </div>
        <div class="footer">
          <button class="btn-back" onclick="back()">← Back</button>
          <div style="display:flex;align-items:center;gap:12px">
            <span class="step-counter">4 / ${TOTAL_STEPS}</span>
            <button class="btn-next" onclick="next()">Review →</button>
          </div>
        </div>`;

    // ── Step 5: Review (read-only) ──
    } else if (step === 5) {
      if (!previewData) {
        content = `
          <div class="preview-loading">Loading ${data.cardName || 'card'} details…</div>
          <div class="footer">
            <button class="btn-back" onclick="back()">← Back</button>
            <span></span>
          </div>`;
      } else {
        const earnRates = previewData.earnRates || [];
        const benefits  = previewData.benefits  || [];
        const fee = (previewData.annualFee != null) ? '$' + previewData.annualFee : '—';

        const earnHtml = earnRates.length
          ? `<div class="preview-section-label">⚡ Earn Rates</div>` +
            earnRates.map(r =>
              `<div class="earn-rate-row">
                <span class="earn-mult-badge">${esc(r.multiplier)}x</span>
                <span class="earn-cat-text">${esc(r.category)}</span>
              </div>`
            ).join('')
          : '';

        const benefitsHtml = benefits.length
          ? `<div class="preview-section-label">✨ Benefits</div>` +
            benefits.map(b => {
              const valStr  = (b.value !== null && b.value !== undefined) ? `<span class="benefit-val">$${esc(b.value)}</span>` : '';
              const freqStr = b.frequency ? `<span class="benefit-freq">${esc(b.frequency)}</span>` : '';
              return `<div class="benefit-item">
                <div class="benefit-item-name">${esc(b.name) || '—'}</div>
                ${(valStr || freqStr) ? `<div class="benefit-meta">${valStr}${freqStr}</div>` : ''}
              </div>`;
            }).join('')
          : `<div class="no-data-note">No benefits data found for this card.</div>`;

        content = `
          <div class="preview-body">
            <div class="step-label">Step 5 of ${TOTAL_STEPS} — Review</div>
            <div class="preview-card-header">
              <div>
                <div class="preview-card-name">${esc(data.cardName)}</div>
                <div class="preview-bank-name">${esc(data.bank)}</div>
              </div>
              <div class="preview-fee-badge">Annual Fee: ${fee}</div>
            </div>
            <div class="preview-scroll">
              ${earnHtml}
              ${benefitsHtml}
            </div>
          </div>
          <div class="footer">
            <button class="btn-back" onclick="back()">← Back</button>
            <div style="display:flex;align-items:center;gap:12px">
              <span class="step-counter">5 / ${TOTAL_STEPS}</span>
              <button class="btn-submit" onclick="doSubmit()">✓ Save Card</button>
            </div>
          </div>`;
      }
    }

    document.getElementById('formContent').innerHTML = content;
    setTimeout(() => { const i = document.getElementById('pointsInput'); if(i) i.focus(); }, 50);
  }

  function selectBank(el) {
    const bank = el.dataset.bank;
    if (data.bank !== bank) data.cardName = '';
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    data.bank = bank;
  }

  function toggleReminder(checkbox) {
    data.renewalReminder = checkbox.checked;
    document.getElementById('reminderRow').classList.toggle('checked', checkbox.checked);
  }

  function next() {
    if (step === 1 && !data.bank) return;
    if (step === 2 && !data.cardName) return;
    if (step === 3 && (data.points === undefined || data.points === '')) return;
    step++;
    if (step === 5) {
      previewData = null;
      render(); // show loading state immediately
      google.script.run
        .withSuccessHandler(function(json) {
          try { previewData = json ? JSON.parse(json) : {}; } catch(e) { previewData = {}; }
          render();
        })
        .withFailureHandler(function() {
          previewData = {};
          render();
        })
        .getCardPreview(data.bank, data.cardName);
    } else {
      render();
    }
  }

  function back() {
    if (step > 1) {
      if (step === 5) previewData = null; // force re-fetch if they return
      step--;
      render();
    }
  }

  function doSubmit() {
    const btn = document.querySelector('.btn-submit');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Saving…'; }
    google.script.run
      .withSuccessHandler(function() { google.script.host.close(); })
      .withFailureHandler(function(err) {
        if (btn) { btn.disabled = false; btn.textContent = '✓ Save Card'; }
        alert('Error saving: ' + err.message);
      })
      .newCard(JSON.stringify(data));
  }

  // Show loading state while fetching card list from GitHub JSON
  document.getElementById('formContent').innerHTML =
    '<div style="padding:60px 22px;text-align:center;color:#999;font-size:13px">Loading cards…</div>';

  google.script.run
    .withSuccessHandler(function(json) {
      try { cardDatabase = JSON.parse(json); } catch(e) { cardDatabase = {}; }
      if (!Object.keys(cardDatabase).length) cardDatabase = { 'Other': ['Other'] };
      render();
    })
    .withFailureHandler(function() {
      cardDatabase = { 'Other': ['Other'] };
      render();
    })
    .getCardList();
</script>
</body>
</html>
